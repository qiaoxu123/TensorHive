server {
    listen 8090;
    server_name _;

    # API (tensorhive backend :1111)
    location /api/ {
        proxy_pass http://127.0.0.1:1111/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # Admin backend (:8091)
    location /ctl/ {
        proxy_pass http://127.0.0.1:8091/ctl/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # Frontend static files (no-cache for HTML to avoid stale JS)
    location / {
        root /app/webui;
        index index.html;
    }
    location /index.html {
        root /app/webui;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
    location ~* \.(js|css)$ {
        root /app/webui;
        expires 7d;
    }
}
